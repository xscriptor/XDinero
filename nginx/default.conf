# Proxy Inverso Nginx para XDinero
# Gestiona el tráfico entrante y lo redirige al servicio adecuado (Frontend o Backend)

server {
    listen 80;
    server_name localhost;

    # Logs de acceso y error
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # --- FRONTEND (Archivos Estáticos) ---
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # --- BACKEND (PHP/Apache) ---
    # Redirige todo lo que empiece por /backend al servicio de backend
    location /backend {
        # Configuración CORS (Manejo de preflight OPTIONS directamente en Nginx)
        # Esto soluciona problemas de CORS cuando el backend falla o tarda
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            # Headers permitidos (añade los que necesites)
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            add_header 'Content-Length' 0 always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            return 204;
        }

        # Headers CORS para respuestas normales (GET, POST, etc.)
        # Habilitamos esto en Nginx para asegurar que siempre estén presentes, incluso si PHP falla.
        # Si PHP también los envía, Nginx suele manejarlo o el navegador usa el primero.
        # Pero para evitar problemas, vamos a forzarlos aquí y recomendar que PHP no los envíe o que sean consistentes.
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        proxy_pass http://backend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Ocultar headers de PHP para evitar duplicados si es necesario (opcional)
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Credentials';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';

        # Aumentar timeouts para procesos largos si es necesario
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    # Bloquear acceso directo a archivos sensibles
    location ~ /\.ht {
        deny all;
    }
}
